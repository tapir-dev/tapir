# release-plz configuration for local-first releases.
# Flow (run from this machine):
#   1. release-plz update          # bump versions + write CHANGELOGs
#   2. review the diff, commit, push
#   3. release-plz release         # tag + GitHub release (no crates.io)
# See RELEASING.md for prerequisites (tokens) and the full procedure.

[workspace]
# GitHub-only releases: tag + GitHub release, but no `cargo publish`. tapir is
# consumed as a git dependency, not from crates.io.
publish = false
git_tag_enable = true
git_release_enable = true
# semver_check diffs the API against the crates.io-published version; with no
# published baseline it has nothing to compare, so it stays off.
semver_check = false

# The three crates share one version in [workspace.package]; release together.
[changelog]
# We do NOT use conventional commits, so the catch-all parser at the end keeps
# every commit in the changelog instead of dropping non-matching ones. Verbs
# are mapped to sections on a best-effort basis.
protect_breaking_commits = true
sort_commits = "oldest"
commit_parsers = [
    { message = "^[Aa]dd", group = "Added" },
    { message = "^[Ss]upport", group = "Added" },
    { message = "^[Ff]ix", group = "Fixed" },
    { message = "^[Rr]emove", group = "Removed" },
    { message = "^[Dd]rop", group = "Removed" },
    { message = "^[Dd]oc", group = "Documentation" },
    { message = "^[Rr]efactor|^[Cc]lean|^[Tt]ighten", group = "Changed" },
    { message = "^[Bb]ump|^[Uu]pdate|^[Dd]eps", group = "Changed" },
    { message = ".*", group = "Changed" },
]
